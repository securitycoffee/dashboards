<head>

<title>Government Funds Dashboard — SLFRF</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e9;
    --ink: #1a1814;
    --card: #fffdf8;
    --border: #e4ddcf;
    --muted: #8a8170;
    --muted2: #6b6458;
    --track: #efe9dc;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 28px 32px 64px;
  }
  ::selection { background: oklch(0.62 0.2 352 / 0.25); }

  .scrollx { overflow-x: auto; }
  .scrollx::-webkit-scrollbar { height: 8px; }
  .scrollx::-webkit-scrollbar-thumb { background: #d8d2c7; border-radius: 8px; }

  /* header */
  .header {
    display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap;
    border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 24px;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: oklch(0.62 0.2 352); font-weight: 600; margin-bottom: 8px;
  }
  h1.title {
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 40px; line-height: 1.0;
    margin: 0; letter-spacing: -0.02em;
  }
  .live-filter { display: flex; gap: 10px; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted2); }
  .live-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: oklch(0.66 0.15 162); }

  /* kpis */
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px; }
  .kpi-card { border-radius: 14px; padding: 16px 18px; border: 1.5px solid; }
  .kpi-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.72; font-weight: 600; }
  .kpi-value { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 30px; line-height: 1.05; margin-top: 10px; letter-spacing: -0.02em; }
  .kpi-sub { font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-top: 6px; opacity: 0.8; }

  /* controls */
  .controls {
    display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
    background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 22px;
  }
  .chip-group { display: flex; align-items: center; gap: 8px; }
  .chip-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
  .chip-flat { display: contents; }
  .v-divider { width: 1px; height: 26px; background: var(--border); }
  .spacer { flex: 1; }
  .search-input {
    font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 9px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; background: var(--bg); width: 240px; outline: none; color: var(--ink);
  }
  .search-input.small { font-size: 13px; padding: 8px 12px; border-radius: 9px; width: 200px; }
  .reset-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; padding: 9px 14px; border: 1.5px solid var(--ink);
    border-radius: 10px; background: var(--ink); color: var(--bg); cursor: pointer;
  }
  button { font: inherit; }

  /* generic card */
  .card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px 22px; }
  .card-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 19px; margin: 0; letter-spacing: -0.01em; }
  .card-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* row layout */
  .row-b { display: grid; grid-template-columns: 1.35fr 1fr; gap: 18px; margin-bottom: 18px; }
  .row-c { display: grid; grid-template-columns: 1fr 1.35fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 900px) {
    .row-b, .row-c { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
  }

  /* map */
  .map-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
  .metric-toggle { display: flex; gap: 4px; background: #f0eadd; border-radius: 9px; padding: 3px; }
  .tile-grid { display: grid; grid-template-columns: repeat(11, 1fr); grid-auto-rows: 1fr; gap: 5px; margin-top: 14px; }
  .tile { display: flex; align-items: center; justify-content: center; border-radius: 7px; aspect-ratio: 1; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; }
  .legend-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .legend-bar { flex: 1; height: 9px; border-radius: 6px; }

  /* donuts */
  .donut-row { display: flex; align-items: center; gap: 18px; }
  .donut-wrap { position: relative; width: 160px; height: 160px; flex-shrink: 0; }
  .donut-svg { width: 160px; height: 160px; transform: rotate(-90deg); }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .donut-total { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 22px; line-height: 1; }
  .donut-total-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
  .donut-legend { flex: 1; display: flex; flex-direction: column; }
  .legend-item { display: flex; align-items: center; gap: 9px; cursor: pointer; padding: 5px 7px; border-radius: 8px; }
  .legend-swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  .legend-text { flex: 1; min-width: 0; }
  .legend-label { font-size: 13px; font-weight: 600; }
  .legend-detail { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted); }
  .legend-pct { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; }

  /* bars */
  .bars-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .bars-legend { display: flex; gap: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .legend-key { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .bars-list { display: flex; flex-direction: column; gap: 11px; }
  .bar-item { cursor: pointer; }
  .bar-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .bar-name { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--muted2); flex-shrink: 0; }
  .bar-track { position: relative; height: 14px; background: var(--track); border-radius: 7px; overflow: hidden; }
  .bar-fill { position: absolute; top: 0; left: 0; height: 100%; border-radius: 7px; }

  /* table */
  .table-head { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .table-controls { display: flex; align-items: center; gap: 12px; }
  .table-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  table.recipients-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 760px; }
  .th-sort { padding: 9px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-weight: 600; cursor: pointer; border-bottom: 2px solid var(--ink); white-space: nowrap; user-select: none; }
  .section-row td { padding: 11px 12px; cursor: pointer; user-select: none; }
  .section-head { display: flex; align-items: center; gap: 10px; }
  .caret { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted2); width: 12px; }
  .section-swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; }
  .section-label { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 14px; }
  .section-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--muted); }
  .data-row td { padding: 10px 12px; border-bottom: 1px solid var(--track); }
  .td-name { font-weight: 600; }
  .td-muted { color: var(--muted2); }
  .td-num { text-align: right; font-family: 'IBM Plex Mono', monospace; }
  .tier-badge { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .pct-cell { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }
  .pct-track { width: 46px; height: 6px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .pct-fill { height: 100%; }
  .pct-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; width: 38px; }
</style>
</head>

<script>
(function () {
  "use strict";

  var DATA = window.SLFRF_DATA;

  var GRID = {
    AK:[1,1], ME:[1,11], VT:[2,10], NH:[2,11], WA:[3,1], ID:[3,2], MT:[3,3], ND:[3,4], MN:[3,5], IL:[3,6],
    WI:[3,7], MI:[3,8], NY:[3,9], RI:[3,10], MA:[3,11], OR:[4,1], NV:[4,2], WY:[4,3], SD:[4,4], IA:[4,5],
    IN:[4,6], OH:[4,7], PA:[4,8], NJ:[4,9], CT:[4,10], CA:[5,1], UT:[5,2], CO:[5,3], NE:[5,4], MO:[5,5],
    KY:[5,6], WV:[5,7], VA:[5,8], MD:[5,9], DE:[5,10], AZ:[6,2], NM:[6,3], KS:[6,4], AR:[6,5], TN:[6,6],
    NC:[6,7], SC:[6,8], DC:[6,9], OK:[7,4], LA:[7,5], MS:[7,6], AL:[7,7], GA:[7,8], HI:[8,1], TX:[8,4],
    FL:[8,8], PR:[8,10], AS:[8,11]
  };

  var PAL = { c1: 'oklch(0.58 0.17 255)', c2: 'oklch(0.64 0.15 162)', c3: 'oklch(0.76 0.15 70)', c4: 'oklch(0.6 0.2 352)', c5: 'oklch(0.55 0.18 300)' };
  var BAR_COUNT = 8;

  var stateTotals = {};
  function buildTotals() {
    stateTotals = {};
    for (var i = 0; i < DATA.length; i++) {
      var r = DATA[i];
      var t = stateTotals[r.ab] || (stateTotals[r.ab] = { alloc: 0, spent: 0, bb: 0, n: 0, name: r.state });
      t.alloc += r.alloc; t.spent += r.spent; t.bb += r.bb; t.n++;
    }
  }
  buildTotals();

  var state = {
    tier: 'all', type: 'all', stateSel: 'all', q: '',
    sortKey: 'alloc', sortDir: 'desc', metric: 'alloc',
    collapsed: {}, tableQ: ''
  };

  function setState(patch) {
    for (var k in patch) state[k] = patch[k];
    render();
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function fmt(n) {
    var s = n < 0 ? '-' : ''; n = Math.abs(n);
    if (n >= 1e9) return s + '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return s + '$' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return s + '$' + (n / 1e3).toFixed(0) + 'K';
    return s + '$' + Math.round(n);
  }

  function donut(groups) {
    var total = 0;
    for (var i = 0; i < groups.length; i++) total += groups[i].value;
    total = total || 1;
    var C = 2 * Math.PI * 60;
    var cum = 0;
    return groups.map(function (g) {
      var frac = g.value / total;
      var dash = Math.max(0, frac * C - 1.5);
      var seg = Object.assign({}, g, {
        frac: frac, pct: frac * 100, pctLabel: (frac * 100).toFixed(1) + '%',
        dash: dash + ' ' + (C - dash), offset: -cum * C
      });
      cum += frac;
      return seg;
    });
  }

  function chipStyle(active, color) {
    return "font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer;border:1.5px solid " +
      (active ? '#1a1814' : '#e4ddcf') + ";background:" + (active ? (color || '#1a1814') : '#fffdf8') +
      ";color:" + (active ? '#fff' : '#6b6458') + ";transition:all 0.12s;";
  }

  function filteredData() {
    var q = state.q.trim().toLowerCase();
    return DATA.filter(function (r) {
      return (state.tier === 'all' || r.tier === state.tier) &&
        (state.type === 'all' || r.type === state.type) &&
        (state.stateSel === 'all' || r.ab === state.stateSel) &&
        (q === '' || r.name.toLowerCase().indexOf(q) !== -1 || r.state.toLowerCase().indexOf(q) !== -1);
    });
  }

  function setTier(t) { setState({ tier: state.tier === t ? 'all' : t }); }
  function setType(t) { setState({ type: state.type === t ? 'all' : t }); }
  function setStateSel(ab) { setState({ stateSel: state.stateSel === ab ? 'all' : ab }); }
  function setSort(k) { setState({ sortKey: k, sortDir: (state.sortKey === k && state.sortDir === 'desc') ? 'asc' : 'desc' }); }
  function toggleTier(t) { var c = Object.assign({}, state.collapsed); c[t] = !c[t]; setState({ collapsed: c }); }
  function resetFilters() { setState({ tier: 'all', type: 'all', stateSel: 'all', q: '' }); }

  // ---- view model ----
  function computeViewModel() {
    var pal = PAL;
    var f = filteredData();
    function sum(arr, k) { var s = 0; for (var i = 0; i < arr.length; i++) s += arr[i][k]; return s; }

    var tA = sum(f, 'alloc'), tS = sum(f, 'spent'), tB = sum(f, 'bb'), tR = sum(f, 'rem');
    var statesSet = {}; f.forEach(function (r) { statesSet[r.ab] = 1; });
    var nStates = Object.keys(statesSet).length;

    function card(bg, fg) { return "background:" + bg + ";color:" + fg + ";border-radius:14px;padding:16px 18px;border:1.5px solid " + bg + ";"; }
    var kpis = [
      { label: 'Total Allocation', value: fmt(tA), sub: f.length + ' recipients', cardStyle: card('#1a1814', '#f5f1e9') },
      { label: 'Obligated / Spent', value: fmt(tS), sub: (tA ? (tS / tA * 100).toFixed(1) : '0') + '% deployed', cardStyle: "background:" + pal.c2 + ";color:#fff;border-radius:14px;padding:16px 18px;border:1.5px solid " + pal.c2 + ";" },
      { label: 'Broadband Spend', value: fmt(tB), sub: (tS ? (tB / tS * 100).toFixed(1) : '0') + '% of spend', cardStyle: "background:" + pal.c3 + ";color:#1a1814;border-radius:14px;padding:16px 18px;border:1.5px solid " + pal.c3 + ";" },
      { label: 'Remaining Funds', value: fmt(tR), sub: (tA ? (tR / tA * 100).toFixed(2) : '0') + '% unspent', cardStyle: "background:" + pal.c4 + ";color:#fff;border-radius:14px;padding:16px 18px;border:1.5px solid " + pal.c4 + ";" },
      { label: 'States Covered', value: String(nStates), sub: 'of ' + Object.keys(stateTotals).length + ' in dataset', cardStyle: "background:#fffdf8;color:#1a1814;border-radius:14px;padding:16px 18px;border:1.5px solid #e4ddcf;" }
    ];

    var tierColors = { '1': pal.c1, '2': pal.c5, '5': pal.c3 };
    var tierChips = [{ k: 'all', l: 'All' }, { k: '1', l: 'Tier 1' }, { k: '2', l: 'Tier 2' }, { k: '5', l: 'Tier 5' }].map(function (c) {
      return {
        key: c.k, label: c.l,
        style: chipStyle(state.tier === c.k, c.k === 'all' ? '#1a1814' : tierColors[c.k])
      };
    });
    var typeChips = [{ k: 'all', l: 'All' }, { k: 'State/DC', l: 'State / DC' }, { k: 'Local Government', l: 'Local Gov' }].map(function (c) {
      return {
        key: c.k, label: c.l,
        style: chipStyle(state.type === c.k, c.k === 'State/DC' ? pal.c4 : pal.c2)
      };
    });

    var metricHue = { alloc: 255, spent: 162, bb: 70 };
    var metricChips = [{ k: 'alloc', l: 'Allocation' }, { k: 'spent', l: 'Spent' }, { k: 'bb', l: 'Broadband' }].map(function (c) {
      return {
        key: c.k, label: c.l,
        style: "font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer;border:none;background:" +
          (state.metric === c.k ? '#1a1814' : 'transparent') + ";color:" + (state.metric === c.k ? '#fff' : '#8a8170') + ";"
      };
    });

    var metric = state.metric;
    var hue = metricHue[metric];
    var maxV = 0;
    for (var k in stateTotals) maxV = Math.max(maxV, stateTotals[k][metric]);
    maxV = maxV || 1;
    var tiles = Object.keys(GRID).map(function (ab) {
      var rc = GRID[ab];
      var t = stateTotals[ab];
      var has = !!t;
      var sel = state.stateSel === ab;
      var bg = '#ece7dd', fg = '#bcb4a4', border = '1.5px solid transparent';
      if (has) {
        var inten = Math.sqrt(t[metric] / maxV);
        var L = 0.93 - 0.46 * inten, Ch = 0.035 + 0.14 * inten;
        bg = 'oklch(' + L.toFixed(3) + ' ' + Ch.toFixed(3) + ' ' + hue + ')';
        fg = inten > 0.55 ? '#fff' : '#1a1814';
      }
      if (sel) border = '2.5px solid #1a1814';
      return {
        ab: ab, has: has,
        title: has ? (t.name + ': ' + fmt(t[metric]) + ' · ' + t.n + ' recipient' + (t.n > 1 ? 's' : '')) : ab,
        style: "grid-row:" + rc[0] + ";grid-column:" + rc[1] + ";background:" + bg + ";color:" + fg + ";border:" + border +
          ";cursor:" + (has ? 'pointer' : 'default') + ";box-shadow:" + (sel ? '0 0 0 3px oklch(0.62 0.2 352 / 0.25)' : 'none') + ";"
      };
    });
    var legendGradient = "linear-gradient(90deg, oklch(0.93 0.035 " + hue + "), oklch(0.47 0.175 " + hue + "))";

    var tierAgg = {};
    f.forEach(function (r) { var t = tierAgg[r.tier] || (tierAgg[r.tier] = { v: 0, n: 0 }); t.v += r.alloc; t.n++; });
    var tierNames = { '1': 'Tier 1 · Large states & metros', '2': 'Tier 2 · Mid-size local gov', '5': 'Tier 5 · Small local gov' };
    var tierGroups = ['1', '2', '5'].filter(function (kk) { return tierAgg[kk]; }).map(function (kk) {
      return { key: kk, label: 'Tier ' + kk, color: tierColors[kk], value: tierAgg[kk].v, detail: tierAgg[kk].n + ' recipients · ' + fmt(tierAgg[kk].v) };
    });
    var tierDonut = donut(tierGroups).map(function (s) {
      return Object.assign({}, s, {
        label: tierNames[s.key],
        legendStyle: "display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 7px;border-radius:8px;background:" + (state.tier === s.key ? '#f0eadd' : 'transparent') + ";"
      });
    });

    var typeAgg = {};
    f.forEach(function (r) { var t = typeAgg[r.type] || (typeAgg[r.type] = { v: 0, n: 0 }); t.v += r.alloc; t.n++; });
    function typeLabel(kk) { return kk === 'State/DC' ? 'State / DC' : (kk === 'Territorial Government' ? 'Territorial' : 'Local Government'); }
    var typeColors = { 'State/DC': pal.c4, 'Local Government': pal.c2, 'Territorial Government': pal.c3 };
    var typeGroups = Object.keys(typeAgg).map(function (kk) {
      return { key: kk, label: typeLabel(kk), color: typeColors[kk], value: typeAgg[kk].v, detail: typeAgg[kk].n + ' recipients · ' + fmt(typeAgg[kk].v) };
    });
    var typeDonut = donut(typeGroups).map(function (s) {
      return Object.assign({}, s, {
        legendStyle: "display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 7px;border-radius:8px;background:" + (state.type === s.key ? '#f0eadd' : 'transparent') + ";"
      });
    });

    var sortedB = f.slice().sort(function (a, b) { return b.bb - a.bb; }).slice(0, BAR_COUNT);
    var maxBase = 1;
    sortedB.forEach(function (r) { maxBase = Math.max(maxBase, r.spent, r.bb); });
    var bars = sortedB.map(function (r) {
      return {
        ab: r.ab, name: r.name,
        allocLabel: fmt(r.bb) + ' broadband',
        spentPct: (r.spent ? (r.bb / r.spent * 100) : 0).toFixed(0) + '% of spend',
        allocW: (r.spent / maxBase * 100).toFixed(2) + '%',
        spentW: (r.bb / maxBase * 100).toFixed(2) + '%'
      };
    });

    var cols = [
      { k: 'name', l: 'Recipient', align: 'left' }, { k: 'state', l: 'State', align: 'left' },
      { k: 'tier', l: 'Tier', align: 'left' }, { k: 'type', l: 'Type', align: 'left' },
      { k: 'alloc', l: 'Allocation', align: 'right' }, { k: 'spent', l: 'Spent', align: 'right' },
      { k: 'spentpct', l: '% Spent', align: 'right' }, { k: 'bb', l: 'Broadband', align: 'right' }
    ];
    var columns = cols.map(function (c) {
      return {
        key: c.k, label: c.l,
        arrow: state.sortKey === c.k ? (state.sortDir === 'desc' ? ' ↓' : ' ↑') : '',
        align: c.align
      };
    });
    var dir = state.sortDir === 'desc' ? -1 : 1;
    var sk = state.sortKey;
    function sortFn(a, b) {
      var av, bv;
      if (sk === 'spentpct') { av = a.alloc ? a.spent / a.alloc : 0; bv = b.alloc ? b.spent / b.alloc : 0; }
      else { av = a[sk]; bv = b[sk]; }
      if (typeof av === 'string') return av.localeCompare(bv) * dir;
      return (av - bv) * dir;
    }
    function mapRow(r, i) {
      return {
        name: r.name, state: r.state,
        type: r.type === 'State/DC' ? 'State / DC' : (r.type === 'Territorial Government' ? 'Territorial' : 'Local Gov'),
        tierLabel: 'T' + r.tier,
        tierBadgeBg: tierColors[r.tier], tierBadgeFg: r.tier === '5' ? '#1a1814' : '#fff',
        alloc: fmt(r.alloc), spent: fmt(r.spent),
        spentPct: (r.alloc ? (r.spent / r.alloc * 100) : 0).toFixed(0) + '%',
        spentPctW: Math.min(100, r.alloc ? r.spent / r.alloc * 100 : 0).toFixed(1) + '%',
        bb: fmt(r.bb),
        alt: !!(i % 2)
      };
    }
    var tierNamesShort = { '1': 'Tier 1 · States & large metros', '2': 'Tier 2 · Mid-size local gov', '5': 'Tier 5 · Small local gov' };
    var tq = (state.tableQ || '').trim().toLowerCase();
    var tableData = tq ? f.filter(function (r) { return r.name.toLowerCase().indexOf(tq) !== -1 || r.state.toLowerCase().indexOf(tq) !== -1 || r.id.toLowerCase().indexOf(tq) !== -1; }) : f;
    var tierSections = ['1', '2', '5'].filter(function (t) { return tableData.some(function (r) { return r.tier === t; }); }).map(function (t) {
      var group = tableData.filter(function (r) { return r.tier === t; }).sort(sortFn);
      var collapsed = tq ? false : !!state.collapsed[t];
      var totA = sum(group, 'alloc');
      return {
        tier: t, label: tierNamesShort[t], color: tierColors[t],
        meta: group.length + ' recipients · ' + fmt(totA) + ' allocated',
        caret: collapsed ? '▸' : '▾',
        rows: collapsed ? [] : group.map(mapRow)
      };
    });

    var anyFilter = state.tier !== 'all' || state.type !== 'all' || state.stateSel !== 'all' || state.q !== '';

    return {
      kpis: kpis, tierChips: tierChips, typeChips: typeChips, metricChips: metricChips,
      tiles: tiles, tierDonut: tierDonut, typeDonut: typeDonut, bars: bars,
      columns: columns, tierSections: tierSections,
      filteredCount: f.length, total: DATA.length, tableCount: tableData.length,
      anyFilter: anyFilter,
      allocColor: pal.c1, spentColor: pal.c2, bbColor: pal.c3,
      tierTotal: fmt(tA), typeTotal: fmt(tA),
      stateCountLabel: nStates + ' states active',
      legendGradient: legendGradient
    };
  }

  // ---- templates ----
  function tpl(vm) {
    var html = '';

    html += '<div class="header">';
    html += '<div><div class="eyebrow">State &amp; Local Fiscal Recovery Funds · Grant Sales Motion</div>';
    html += '<h1 class="title">Government Funds Dashboard</h1></div>';
    html += '<div class="live-filter"><span class="live-dot"></span>Live filter · ' + vm.filteredCount + ' of ' + vm.total + ' recipients</div>';

    html += '<div class="kpi-row">';
    vm.kpis.forEach(function (k) {
      html += '<div class="kpi-card" style="' + k.cardStyle + '">';
      html += '<div class="kpi-label">' + esc(k.label) + '</div>';
      html += '<div class="kpi-value">' + esc(k.value) + '</div>';
      html += '<div class="kpi-sub">' + esc(k.sub) + '</div></div>';

    html += '</div>';

    html += '<div class="controls">';
    html += '<div class="chip-group"><span class="chip-label">Tier</span><span class="chip-flat">';
    vm.tierChips.forEach(function (c) {
      html += '<button data-act="tier" data-val="' + c.key + '" style="' + c.style + '">' + esc(c.label) + '</button>';
    });
    html += '</span></div>';
    html += '<div class="v-divider"></div>';
    html += '<div class="chip-group"><span class="chip-label">Type</span><span class="chip-flat">';
    vm.typeChips.forEach(function (c) {
      html += '<button data-act="type" data-val="' + esc(c.key) + '" style="' + c.style + '">' + esc(c.label) + '</button>';
    });
    html += '</span></div>';
    html += '<div class="spacer"></div>';
    html += '<input id="searchInput" class="search-input" placeholder="Search recipient or state…" value="' + esc(state.q) + '" />';
    if (vm.anyFilter) {
      html += '<button data-act="reset" class="reset-btn">Reset ✕</button>';
    }
    html += '</div>';

    html += '<div class="row-b">';

    html += '<div class="card"><div class="map-head"><div>';
    html += '<h3 class="card-title">Funds by State</h3>';
    html += '<div class="card-sub">' + esc(vm.stateCountLabel) + ' · click a state to filter</div></div>';
    html += '<div class="metric-toggle"><span class="chip-flat">';
    vm.metricChips.forEach(function (c) {
      html += '<button data-act="metric" data-val="' + c.key + '" style="' + c.style + '">' + esc(c.label) + '</button>';
    });
    html += '</span></div></div>';
    html += '<div class="tile-grid">';
    vm.tiles.forEach(function (t) {
      html += '<div ' + (t.has ? 'data-act="state" data-val="' + t.ab + '"' : '') + ' title="' + esc(t.title) + '" class="tile" style="' + t.style + '">';
      html += '<span>' + t.ab + '</span></div>';
    });
    html += '</div>';
    html += '<div class="legend-row"><span>Low</span><div class="legend-bar" style="background:' + vm.legendGradient + ';"></div><span>High</span></div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<h3 class="card-title" style="margin:0 0 2px;">Reporting Tier Makeup</h3>';
    html += '<div class="card-sub" style="margin-bottom:8px;margin-top:0;">Share of allocated funds · click to filter</div>';
    html += '<div class="donut-row"><div class="donut-wrap"><svg viewBox="0 0 160 160" class="donut-svg">';
    html += '<circle cx="80" cy="80" r="60" fill="none" stroke="#efe9dc" stroke-width="26"></circle>';
    vm.tierDonut.forEach(function (s) {
      html += '<circle cx="80" cy="80" r="60" fill="none" stroke="' + s.color + '" stroke-width="26" stroke-dasharray="' + s.dash + '" stroke-dashoffset="' + s.offset + '" data-act="tier" data-val="' + s.key + '" style="cursor:pointer;"></circle>';
    });
    html += '</svg><div class="donut-center"><div class="donut-total">' + esc(vm.tierTotal) + '</div><div class="donut-total-label">allocated</div></div></div>';
    html += '<div class="donut-legend" style="gap:9px;">';
    vm.tierDonut.forEach(function (s) {
      html += '<div data-act="tier" data-val="' + s.key + '" style="' + s.legendStyle + '">';
      html += '<span class="legend-swatch" style="background:' + s.color + ';"></span>';
      html += '<div class="legend-text"><div class="legend-label">' + esc(s.label) + '</div><div class="legend-detail">' + esc(s.detail) + '</div></div>';
      html += '<div class="legend-pct">' + esc(s.pctLabel) + '</div></div>';
    });
    html += '</div></div></div>';

    html += '</div>'; // row-b

    html += '<div class="row-c">';

    html += '<div class="card">';
    html += '<h3 class="card-title" style="margin:0 0 2px;">Recipient Type</h3>';
    html += '<div class="card-sub" style="margin-bottom:8px;margin-top:0;">Allocation by recipient type</div>';
    html += '<div class="donut-row"><div class="donut-wrap"><svg viewBox="0 0 160 160" class="donut-svg">';
    html += '<circle cx="80" cy="80" r="60" fill="none" stroke="#efe9dc" stroke-width="26"></circle>';
    vm.typeDonut.forEach(function (s) {
      html += '<circle cx="80" cy="80" r="60" fill="none" stroke="' + s.color + '" stroke-width="26" stroke-dasharray="' + s.dash + '" stroke-dashoffset="' + s.offset + '" data-act="type" data-val="' + esc(s.key) + '" style="cursor:pointer;"></circle>';
    });
    html += '</svg><div class="donut-center"><div class="donut-total">' + esc(vm.typeTotal) + '</div><div class="donut-total-label">total</div></div></div>';
    html += '<div class="donut-legend" style="gap:10px;">';
    vm.typeDonut.forEach(function (s) {
      html += '<div data-act="type" data-val="' + esc(s.key) + '" style="' + s.legendStyle + '">';
      html += '<span class="legend-swatch" style="background:' + s.color + ';"></span>';
      html += '<div class="legend-text"><div class="legend-label">' + esc(s.label) + '</div><div class="legend-detail">' + esc(s.detail) + '</div></div>';
      html += '<div class="legend-pct">' + esc(s.pctLabel) + '</div></div>';
    });
    html += '</div></div></div>';

    html += '<div class="card">';
    html += '<div class="bars-head"><div>';
    html += '<h3 class="card-title">Top Broadband Spend</h3>';
    html += '<div class="card-sub">Recipients with the most broadband spend</div></div>';
    html += '<div class="bars-legend">';
    html += '<span class="legend-key"><span class="legend-dot" style="background:' + vm.spentColor + ';opacity:0.4;"></span>Total spent</span>';
    html += '<span class="legend-key"><span class="legend-dot" style="background:' + vm.bbColor + ';"></span>Broadband</span>';
    html += '</div></div>';
    html += '<div class="bars-list">';
    vm.bars.forEach(function (b) {
      html += '<div data-act="state" data-val="' + b.ab + '" class="bar-item">';
      html += '<div class="bar-row"><span class="bar-name">' + esc(b.name) + '</span><span class="bar-meta">' + esc(b.allocLabel) + ' · ' + esc(b.spentPct) + '</span></div>';
      html += '<div class="bar-track">';
      html += '<div class="bar-fill" style="width:' + b.allocW + ';background:' + vm.spentColor + ';opacity:0.32;"></div>';
      html += '<div class="bar-fill" style="width:' + b.spentW + ';background:' + vm.bbColor + ';"></div>';
      html += '</div></div>';
    });
    html += '</div></div>';

    html += '</div>'; // row-c

    html += '<div class="card">';
    html += '<div class="table-head"><h3 class="card-title">Recipients</h3>';
    html += '<div class="table-controls">';
    html += '<input id="tableSearchInput" class="search-input small" placeholder="Search this list…" value="' + esc(state.tableQ) + '" />';
    html += '<span class="table-count">' + vm.tableCount + ' rows · click header to sort</span>';
    html += '</div></div>';
    html += '<div class="scrollx"><table class="recipients-table"><thead><tr>';
    vm.columns.forEach(function (c) {
      html += '<th data-act="sort" data-val="' + c.key + '" class="th-sort" style="text-align:' + c.align + ';">' + esc(c.label) + c.arrow + '</th>';
    });
    html += '</tr></thead><tbody>';
    vm.tierSections.forEach(function (sec) {
      html += '<tr data-act="toggleTier" data-val="' + sec.tier + '" class="section-row" style="background:#f3eee3;border-bottom:2px solid ' + sec.color + ';">';
      html += '<td colspan="8"><div class="section-head"><span class="caret">' + sec.caret + '</span>';
      html += '<span class="section-swatch" style="background:' + sec.color + ';"></span>';
      html += '<span class="section-label">' + esc(sec.label) + '</span>';
      html += '<span class="section-meta">' + esc(sec.meta) + '</span></div></td></tr>';
      sec.rows.forEach(function (r, i) {
        html += '<tr class="data-row" style="background:' + (r.alt ? '#faf7f0' : 'transparent') + ';">';
        html += '<td class="td-name">' + esc(r.name) + '</td>';
        html += '<td class="td-muted">' + esc(r.state) + '</td>';
        html += '<td><span class="tier-badge" style="background:' + r.tierBadgeBg + ';color:' + r.tierBadgeFg + ';">' + r.tierLabel + '</span></td>';
        html += '<td class="td-muted">' + esc(r.type) + '</td>';
        html += '<td class="td-num">' + esc(r.alloc) + '</td>';
        html += '<td class="td-num">' + esc(r.spent) + '</td>';
        html += '<td class="td-num"><div class="pct-cell"><div class="pct-track"><div class="pct-fill" style="width:' + r.spentPctW + ';background:' + vm.spentColor + ';"></div></div><span class="pct-label">' + r.spentPct + '</span></div></td>';
        html += '<td class="td-num">' + esc(r.bb) + '</td>';
        html += '</tr>';
      });
    });
    html += '</tbody></table></div></div>';

    return html;
  }

  // ---- render ----
  var app = document.getElementById('app');

  function render() {
    var active = document.activeElement;
    var focusInfo = null;
    if (active && active.id && app.contains(active)) {
      focusInfo = { id: active.id, start: active.selectionStart, end: active.selectionEnd };
    }
    var vm = computeViewModel();
    app.innerHTML = tpl(vm);
    if (focusInfo) {
      var el = document.getElementById(focusInfo.id);
      if (el) {
        el.focus();
        if (typeof el.setSelectionRange === 'function' && focusInfo.start != null) {
          try { el.setSelectionRange(focusInfo.start, focusInfo.end); } catch (e) {}
        }
      }
    }
  }

  app.addEventListener('click', function (e) {
    var el = e.target.closest('[data-act]');
    if (!el) return;
    var act = el.getAttribute('data-act');
    var val = el.getAttribute('data-val');
    if (act === 'tier') setTier(val);
    else if (act === 'type') setType(val);
    else if (act === 'state') setStateSel(val);
    else if (act === 'metric') setState({ metric: val });
    else if (act === 'sort') setSort(val);
    else if (act === 'toggleTier') toggleTier(val);
    else if (act === 'reset') resetFilters();
  });

  app.addEventListener('input', function (e) {
    if (e.target.id === 'searchInput') setState({ q: e.target.value });
    else if (e.target.id === 'tableSearchInput') setState({ tableQ: e.target.value });
  });

  render();
})();
</script>
</body>
</html>
