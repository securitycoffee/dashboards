  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"8c710909-a86f-493a-b3cb-1bbc20b898e6\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  ::selection { background: oklch(0.62 0.2 352 / 0.25); }\n  .scrollx::-webkit-scrollbar { height: 8px; }\n  .scrollx::-webkit-scrollbar-thumb { background: #d8d2c7; border-radius: 8px; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#f5f1e9;color:#1a1814;font-family:'IBM Plex Sans',sans-serif;padding:28px 32px 64px;\">\n\n  <!-- HEADER -->\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;border-bottom:2px solid #1a1814;padding-bottom:18px;margin-bottom:24px;\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.62 0.2 352);font-weight:600;margin-bottom:8px;\">State &amp; Local Fiscal Recovery Funds · Grant Sales Motion<\u002Fdiv>\n      <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:40px;line-height:1.0;margin:0;letter-spacing:-0.02em;\">Government Funds Dashboard<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6b6458;\">\n      <span style=\"display:inline-block;width:9px;height:9px;border-radius:50%;background:oklch(0.66 0.15 162);\"><\u002Fspan>\n      Live filter · {{ filteredCount }} of {{ total }} recipients\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- KPI ROW -->\n  <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;\">\n    <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n      <div style=\"{{ k.cardStyle }}\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.72;font-weight:600;\">{{ k.label }}<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;line-height:1.05;margin-top:10px;letter-spacing:-0.02em;\">{{ k.value }}<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;margin-top:6px;opacity:0.8;\">{{ k.sub }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- CONTROLS -->\n  <div style=\"display:flex;gap:18px;align-items:center;flex-wrap:wrap;background:#fffdf8;border:1.5px solid #e4ddcf;border-radius:14px;padding:14px 16px;margin-bottom:22px;\">\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#8a8170;font-weight:600;\">Tier<\u002Fspan>\n      <sc-for list=\"{{ tierChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"width:1px;height:26px;background:#e4ddcf;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#8a8170;font-weight:600;\">Type<\u002Fspan>\n      <sc-for list=\"{{ typeChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <input value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search recipient or state…\" style=\"font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:9px 14px;border:1.5px solid #e4ddcf;border-radius:10px;background:#f5f1e9;width:240px;outline:none;color:#1a1814;\">\n    <sc-if value=\"{{ anyFilter }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ resetFilters }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;padding:9px 14px;border:1.5px solid #1a1814;border-radius:10px;background:#1a1814;color:#f5f1e9;cursor:pointer;\">Reset ✕<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ROW B: MAP + TIER DONUT -->\n  <div style=\"display:grid;grid-template-columns:1.35fr 1fr;gap:18px;margin-bottom:18px;\">\n\n    <!-- MAP -->\n    <div style=\"background:#fffdf8;border:1.5px solid #e4ddcf;border-radius:16px;padding:20px 22px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px;\">\n        <div>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:19px;margin:0;letter-spacing:-0.01em;\">Funds by State<\u002Fh3>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a8170;margin-top:3px;\">{{ stateCountLabel }} · click a state to filter<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;background:#f0eadd;border-radius:9px;padding:3px;\">\n          <sc-for list=\"{{ metricChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(11,1fr);grid-auto-rows:1fr;gap:5px;margin-top:14px;\">\n        <sc-for list=\"{{ tiles }}\" as=\"t\" hint-placeholder-count=\"40\">\n          <div onclick=\"{{ t.onClick }}\" title=\"{{ t.title }}\" style=\"{{ t.style }}\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;\">{{ t.ab }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:12px;margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a8170;\">\n        <span>{{ legendLow }}<\u002Fspan>\n        <div style=\"flex:1;height:9px;border-radius:6px;background:{{ legendGradient }};\"><\u002Fdiv>\n        <span>{{ legendHigh }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TIER DONUT -->\n    <div style=\"background:#fffdf8;border:1.5px solid #e4ddcf;border-radius:16px;padding:20px 22px;\">\n      <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:19px;margin:0 0 2px;letter-spacing:-0.01em;\">Reporting Tier Makeup<\u002Fh3>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a8170;margin-bottom:8px;\">Share of allocated funds · click to filter<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <div style=\"position:relative;width:160px;height:160px;flex-shrink:0;\">\n          <svg viewBox=\"0 0 160 160\" style=\"width:160px;height:160px;transform:rotate(-90deg);\">\n            <circle cx=\"80\" cy=\"80\" r=\"60\" fill=\"none\" stroke=\"#efe9dc\" stroke-width=\"26\"><\u002Fcircle>\n            <sc-for list=\"{{ tierDonut }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <circle cx=\"80\" cy=\"80\" r=\"60\" fill=\"none\" stroke=\"{{ s.color }}\" stroke-width=\"26\" stroke-dasharray=\"{{ s.dash }}\" stroke-dashoffset=\"{{ s.offset }}\" onclick=\"{{ s.onClick }}\" style=\"cursor:pointer;\"><\u002Fcircle>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n          <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;line-height:1;\">{{ tierTotal }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a8170;\">allocated<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:9px;\">\n          <sc-for list=\"{{ tierDonut }}\" as=\"s\" hint-placeholde SLFRF_DATA) && window.SLFRF_DATA.length) {\n          clearInterval(this._poll); this.DATA = window.SLFRF_DATA; this._buildTotals(); this.forceUpdate();\n        }\n      }, 40);\n    }\n  }\n\n  componentWillUnmount() { if (this._poll) clearInterval(this._poll); }\n\n  palette() {\n    const p = this.props.palette || 'Vibrant';\n    if (p === 'Ocean') return {c1:'oklch(0.58 0.13 240)',c2:'oklch(0.66 0.12 192)',c3:'oklch(0.72 0.11 160)',c4:'oklch(0.55 0.14 270)',c5:'oklch(0.5 0.12 255)'};\n    if (p === 'Sunset') return {c1:'oklch(0.62 0.18 28)',c2:'oklch(0.72 0.16 62)',c3:'oklch(0.7 0.18 8)',c4:'oklch(0.58 0.16 348)',c5:'oklch(0.66 0.15 95)'};\n    return {c1:'oklch(0.58 0.17 255)',c2:'oklch(0.64 0.15 162)',c3:'oklch(0.76 0.15 70)',c4:'oklch(0.6 0.2 352)',c5:'oklch(0.55 0.18 300)'};\n  }\n\n  fmt(n) {\n    const s = n < 0 ? '-' : ''; n = Math.abs(n);\n    if (n >= 1e9) return s + '$' + (n/1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return s + '$' + (n/1e6).toFixed(1) + 'M';\n    if (n >= 1e3) return s + '$' + (n/1e3).toFixed(0) + 'K';\n    return s + '$' + Math.round(n);\n  }\n\n  filtered() {\n    const q = this.state.q.trim().toLowerCase();\n    return this.DATA.filter(r =>\n      (this.state.tier === 'all' || r.tier === this.state.tier) &&\n      (this.state.type === 'all' || r.type === this.state.type) &&\n      (this.state.stateSel === 'all' || r.ab === this.state.stateSel) &&\n      (q === '' || r.name.toLowerCase().includes(q) || r.state.toLowerCase().includes(q))\n    );\n  }\n\n  setTier(t) { this.setState(s => ({ tier: s.tier === t ? 'all' : t })); }\n  setType(t) { this.setState(s => ({ type: s.type === t ? 'all' : t })); }\n  setStateSel(ab) { this.setState(s => ({ stateSel: s.stateSel === ab ? 'all' : ab })); }\n  setSort(k) { this.setState(s => ({ sortKey: k, sortDir: s.sortKey === k && s.sortDir === 'desc' ? 'asc' : 'desc' })); }\n\n  donut(groups, palette) {\n    const total = groups.reduce((a, g) => a + g.value, 0) || 1;\n    const C = 2 * Math.PI * 60;\n    let cum = 0;\n    return groups.map(g => {\n      const frac = g.value / total;\n      const dash = Math.max(0, frac * C - 1.5);\n      const seg = { ...g, frac, pct: frac * 100, pctLabel: (frac * 100).toFixed(1) + '%',\n        dash: dash + ' ' + (C - dash), offset: -cum * C };\n      cum += frac;\n      return seg;\n    });\n  }\n\n  chipStyle(active, color) {\n    return `font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer;border:1.5px solid ${active ? '#1a1814' : '#e4ddcf'};background:${active ? (color || '#1a1814') : '#fffdf8'};color:${active ? '#fff' : '#6b6458'};transition:all 0.12s;`;\n  }\n\n  renderVals() {\n    const pal = this.palette();\n    const f = this.filtered();\n    const sum = (arr, k) => arr.reduce((a, r) => a + r[k], 0);\n\n    // KPIs\n    const tA = sum(f, 'alloc'), tS = sum(f, 'spent'), tB = sum(f, 'bb'), tR = sum(f, 'rem');\n    const nStates = new Set(f.map(r => r.ab)).size;\n    const card = (bg, fg) => `background:${bg};color:${fg};border-radius:14px;padding:16px 18px;border:1.5px solid ${bg};`;\n    const kpis = [\n      { label: 'Total Allocation', value: this.fmt(tA), sub: f.length + ' recipients', cardStyle: card('#1a1814', '#f5f1e9') },\n      { label: 'Obligated / Spent', value: this.fmt(tS), sub: (tA ? (tS/tA*100).toFixed(1) : '0') + '% deployed', cardStyle: `background:${pal.c2};color:#fff;border-radius:14px;padding:16px 18px;border:1.5px solid ${pal.c2};` },\n      { label: 'Broadband Spend', value: this.fmt(tB), sub: (tS ? (tB/tS*100).toFixed(1) : '0') + '% of spend', cardStyle: `background:${pal.c3};color:#1a1814;border-radius:14px;padding:16px 18px;border:1.5px solid ${pal.c3};` },\n      { label: 'Remaining Funds', value: this.fmt(tR), sub: (tA ? (tR/tA*100).toFixed(2) : '0') + '% unspent', cardStyle: `background:${pal.c4};color:#fff;border-radius:14px;padding:16px 18px;border:1.5px solid ${pal.c4};` },\n      { label: 'States Covered', value: String(nStates), sub: 'of ' + Object.keys(this.stateTotals).length + ' in dataset', cardStyle: `background:#fffdf8;color:#1a1814;border-radius:14px;padding:16px 18px;border:1.5px solid #e4ddcf;` },\n    ];\n\n    // Tier chips\n    const tierColors = { '1': pal.c1, '2': pal.c5, '5': pal.c3 };\n    const tierChips = [{ k: 'all', l: 'All' }, { k: '1', l: 'Tier 1' }, { k: '2', l: 'Tier 2' }, { k: '5', l: 'Tier 5' }].map(c => ({\n      label: c.l, onClick: () => c.k === 'all' ? this.setState({ tier: 'all' }) : this.setTier(c.k),\n      style: this.chipStyle(this.state.tier === c.k, c.k === 'all' ? '#1a1814' : tierColors[c.k])\n    }));\n    const typeChips = [{ k: 'all', l: 'All' }, { k: 'State/DC', l: 'State / DC' }, { k: 'Local Government', l: 'Local Gov' }].map(c => ({\n      label: c.l, onClick: () => c.k === 'all' ? this.setState({ type: 'all' }) : this.setType(c.k),\n      style: this.chipStyle(this.state.type === c.k, c.k === 'State/DC' ? pal.c4 : pal.c2)\n    }));\n\n    // Metric chips (map)\n    const metricColor = { alloc: pal.c1, spent: pal.c2, bb: pal.c3 };\n    const metricHue = { alloc: this.props.palette === 'Sunset' ? 28 : (this.props.palette === 'Ocean' ? 240 : 255), spent: 162, bb: 70 };\n    const metricChips = [{ k: 'alloc', l: 'Allocation' }, { k: 'spent', l: 'Spent' }, { k: 'bb', l: 'Broadband' }].map(c => ({\n      label: c.l, onClick: () => this.setState({ metric: c.k }),\n      style: `font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer;border:none;background:${this.state.metric === c.k ? '#1a1814' : 'transparent'};color:${this.state.metric === c.k ? '#fff' : '#8a8170'};`\n    }));\n\n    // MAP tiles\n    const metric = this.state.metric;\n    const hue = metricHue[metric];\n    let maxV = 0;\n    for (const k in this.stateTotals) maxV = Math.max(maxV, this.stateTotals[k][metric]);\n    maxV = maxV || 1;\n    const tiles = Object.entries(this.GRID).map(([ab, [row, col]]) => {\n      const t = this.stateTotals[ab];\n      const has = !!t;\n      const sel = this.state.stateSel === ab;\n      let bg = '#ece7dd', fg = '#bcb4a4', border = '1.5px solid transparent';\n      if (has) {\n        const inten = Math.sqrt(t[metric] / maxV);\n        const L = 0.93 - 0.46 * inten, Ch = 0.035 + 0.14 * inten;\n        bg = `oklch(${L.toFixed(3)} ${Ch.toFixed(3)} ${hue})`;\n        fg = inten > 0.55 ? '#fff' : '#1a1814';\n      }\n      if (sel) border = '2.5px solid #1a1814';\n      return {\n        ab, title: has ? `${t.name}: ${this.fmt(t[metric])} · ${t.n} recipient${t.n>1?'s':''}` : ab,\n        onClick: has ? () => this.setStateSel(ab) : () => {},\n        style: `grid-row:${row};grid-column:${col};aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;background:${bg};color:${fg};border:${border};cursor:${has ? 'pointer' : 'default'};box-shadow:${sel ? '0 0 0 3px oklch(0.62 0.2 352 / 0.25)' : 'none'};`\n      };\n    });\n    const metricLabel = { alloc: 'allocation', spent: 'spent', bb: 'broadband' }[metric];\n    const legendGradient = `linear-gradient(90deg, oklch(0.93 0.035 ${hue}), oklch(0.47 0.175 ${hue}))`;\n\n    // TIER donut (from filtered)\n    const tierAgg = {};\n    for (const r of f) { const t = tierAgg[r.tier] || (tierAgg[r.tier] = { v: 0, n: 0 }); t.v += r.alloc; t.n++; }\n    const tierNames = { '1': 'Tier 1 · Large states & metros', '2': 'Tier 2 · Mid-size local gov', '5': 'Tier 5 · Small local gov' };\n    const tierGroups = ['1', '2', '5'].filter(k => tierAgg[k]).map(k => ({\n      key: k, label: 'Tier ' + k, color: tierColors[k], value: tierAgg[k].v,\n      detail: tierAgg[k].n + ' recipients · ' + this.fmt(tierAgg[k].v)\n    }));\n    const tierDonut = this.donut(tierGroups, pal).map(s => ({\n      ...s, label: tierNames[s.key],\n      onClick: () => this.setTier(s.key),\n      legendStyle: `display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 7px;border-radius:8px;background:${this.state.tier === s.key ? '#f0eadd' : 'transparent'};`\n    }));\n\n    // TYPE donut\n    const typeAgg = {};\n    for (const r of f) { const t = typeAgg[r.type] || (typeAgg[r.type] = { v: 0, n: 0 }); t.v += r.alloc; t.n++; }\n    const typeLabel = k => k === 'State/DC' ? 'State / DC' : (k === 'Territorial Government' ? 'Territorial' : 'Local Government');\n    const typeColors = { 'State/DC': pal.c4, 'Local Government': pal.c2, 'Territorial Government': pal.c3 };\n    const typeGroups = Object.keys(typeAgg).map(k => ({\n      key: k, label: typeLabel(k), color: typeColors[k], value: typeAgg[k].v,\n      detail: typeAgg[k].n + ' recipients · ' + this.fmt(typeAgg[k].v)\n    }));\n    const typeDonut = this.donut(typeGroups, pal).map(s => ({\n      ...s, onClick: () => this.setType(s.key),\n      legendStyle: `display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 7px;border-radius:8px;background:${this.state.type === s.key ? '#f0eadd' : 'transparent'};`\n    }));\n\n    // BARS — top recipients by broadband spend\n    const barCount = this.props.barCount || 8;\n    const sortedB = [...f].sort((a, b) => b.bb - a.bb).slice(0, barCount);\n    const maxBase = sortedB.length ? Math.max(...sortedB.map(r => Math.max(r.spent, r.bb))) : 1;\n    const bars = sortedB.map(r => ({\n      name: r.name, allocLabel: this.fmt(r.bb) + ' broadband',\n      spentPct: (r.spent ? (r.bb / r.spent * 100) : 0).toFixed(0) + '% of spend',\n      allocW: (r.spent / maxBase * 100).toFixed(2) + '%',\n      spentW: (r.bb / maxBase * 100).toFixed(2) + '%',\n      onClick: () => this.setStateSel(r.ab)\n    }));\n\n    // TABLE\n    const cols = [\n      { k: 'name', l: 'Recipient', align: 'left' }, { k: 'state', l: 'State', align: 'left' },\n      { k: 'tier', l: 'Tier', align: 'left' }, { k: 'type', l: 'Type', align: 'left' },\n      { k: 'alloc', l: 'Allocation', align: 'right' }, { k: 'spent', l: 'Spent', align: 'right' },\n      { k: 'spentpct', l: '% Spent', align: 'right' }, { k: 'bb', l: 'Broadband', align: 'right' }\n    ];\n    const columns = cols.map(c => ({\n      label: c.l, arrow: this.state.sortKey === c.k ? (this.state.sortDir === 'desc' ? ' ↓' : ' ↑') : '',\n      onClick: () => this.setSort(c.k),\n      style: `text-align:${c.align};padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:#8a8170;font-weight:600;cursor:pointer;border-bottom:2px solid #1a1814;white-space:nowrap;user-select:none;`\n    }));\n    const dir = this.state.sortDir === 'desc' ? -1 : 1;\n    const sk = this.state.sortKey;\n    const sortFn = (a, b) => {\n      let av, bv;\n      if (sk === 'spentpct') { av = a.alloc ? a.spent / a.alloc : 0; bv = b.alloc ? b.spent / b.alloc : 0; }\n      else { av = a[sk]; bv = b[sk]; }\n      if (typeof av === 'string') return av.localeCompare(bv) * dir;\n      return (av - bv) * dir;\n    };\n    const mapRow = (r, i) => ({\n      name: r.name, state: r.state, type: r.type === 'State/DC' ? 'State / DC' : (r.type === 'Territorial Government' ? 'Territorial' : 'Local Gov'),\n      tierLabel: 'T' + r.tier,\n      tierBadge: `display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:${tierColors[r.tier]};color:${r.tier === '5' ? '#1a1814' : '#fff'};`,\n      alloc: this.fmt(r.alloc), spent: this.fmt(r.spent),\n      spentPct: (r.alloc ? (r.spent / r.alloc * 100) : 0).toFixed(0) + '%',\n      spentPctW: Math.min(100, r.alloc ? r.spent / r.alloc * 100 : 0).toFixed(1) + '%',\n      bb: this.fmt(r.bb),\n      rowStyle: `border-bottom:1px solid #efe9dc;background:${i % 2 ? '#faf7f0' : 'transparent'};`\n    });\n    const tierNamesShort = { '1': 'Tier 1 · States & large metros', '2': 'Tier 2 · Mid-size local gov', '5': 'Tier 5 · Small local gov' };\n    const tq = (this.state.tableQ || '').trim().toLowerCase();\n    const tableData = tq ? f.filter(r => r.name.toLowerCase().includes(tq) || r.state.toLowerCase().includes(tq) || r.id.toLowerCase().includes(tq)) : f;\n    const tierSections = ['1', '2', '5'].filter(t => tableData.some(r => r.tier === t)).map(t => {\n      const group = tableData.filter(r => r.tier === t).sort(sortFn);\n      const collapsed = tq ? false : !!this.state.collapsed[t];\n      const totA = group.reduce((s, r) => s + r.alloc, 0);\n      return {\n        tier: t, label: tierNamesShort[t], color: tierColors[t],\n        meta: group.length + ' recipients · ' + this.fmt(totA) + ' allocated',\n        caret: collapsed ? '▸' : '▾',\n        onClick: () => this.toggleTier(t),\n        headerStyle: `cursor:pointer;background:#f3eee3;border-bottom:2px solid ${tierColors[t]};user-select:none;`,\n        rows: collapsed ? [] : group.map(mapRow)\n      };\n    });\n\n    const anyFilter = this.state.tier !== 'all' || this.state.type !== 'all' || this.state.stateSel !== 'all' || this.state.q !== '';\n\n    return {\n      kpis, tierChips, typeChips, metricChips, tiles, tierDonut, typeDonut, bars, columns, tierSections,\n      filteredCount: f.length,\n      total: this.DATA.length,\n      tableCount: tableData.length,\n      tableQuery: this.state.tableQ,\n      onTableSearch: e => this.setState({ tableQ: e.target.value }),\n      query: this.state.q,\n      onSearch: e => this.setState({ q: e.target.value }),\n      anyFilter,\n      resetFilters: () => this.setState({ tier: 'all', type: 'all', stateSel: 'all', q: '' }),\n      allocColor: pal.c1, spentColor: pal.c2, bbColor: pal.c3,\n      tierTotal: this.fmt(tA), typeTotal: this.fmt(tA),\n      stateCountLabel: nStates + ' states active',\n      legendLow: 'Low', legendHigh: 'High', legendGradient,\n      mapMetricLabel: metricLabel\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
